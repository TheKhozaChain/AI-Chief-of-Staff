# Morning Brief + Priority Execution - AI Chief of Staff
# Runs daily at 08:00 AEDT (21:00 UTC previous day)
#
# Flow: Generate brief → Email → Execute top 3 priorities → Commit all results
#
# To pause: comment out the 'schedule' block below
# To resume: uncomment the 'schedule' block

name: Morning Brief + Execute

on:
  # Schedule: 08:00 AEDT = 21:00 UTC (previous day)
  # AEDT is UTC+11, so 08:00 AEDT = 21:00 UTC
  schedule:
    - cron: '0 21 * * *'

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      skip_execution:
        description: 'Skip priority execution (brief only)'
        required: false
        default: 'false'
      max_priorities:
        description: 'Max priorities to execute (default: 3)'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (show plan, don''t execute)'
        required: false
        default: 'false'

concurrency:
  group: repo-push
  cancel-in-progress: false

jobs:
  morning-brief-and-execute:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    # Set timezone for accurate date display in outputs
    env:
      TZ: Australia/Sydney

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic openai

      - name: Generate morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          python scripts/run_morning.py

      - name: Commit morning brief
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Chief of Staff"
          git add data/
          git diff --staged --quiet || git commit -m "Morning brief - $(date +%Y-%m-%d)"

      - name: Execute priorities
        if: ${{ github.event.inputs.skip_execution != 'true' }}
        timeout-minutes: 15
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          PYTHONPATH: strategies/backtest
        run: |
          MAX="${{ github.event.inputs.max_priorities || '3' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python scripts/run_priorities.py --max $MAX"
          if [ "$DRY" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Commit execution results
        if: ${{ github.event.inputs.skip_execution != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Chief of Staff"
          git add data/ strategies/ KANBAN.md
          git diff --staged --quiet || git commit -m "Execute priorities - $(date +%Y-%m-%d)"

      - name: Push all changes
        run: |
          git pull --rebase origin main
          git push

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: python scripts/send_workflow_alert.py
