# Morning Brief + Priority Execution - AI Chief of Staff
# Runs daily at 08:00 AEDT (21:00 UTC previous day)
#
# Flow: Generate brief → Email → Execute top 3 priorities → Commit all results
#
# To pause: comment out the 'schedule' block below
# To resume: uncomment the 'schedule' block

name: Morning Brief + Execute

on:
  # Schedule: 08:00 AEDT = 21:00 UTC (previous day)
  # AEDT is UTC+11, so 08:00 AEDT = 21:00 UTC
  schedule:
    - cron: '0 21 * * *'

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      skip_execution:
        description: 'Skip priority execution (brief only)'
        required: false
        default: 'false'
      max_priorities:
        description: 'Max priorities to execute (default: 3)'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (show plan, don''t execute)'
        required: false
        default: 'false'

jobs:
  morning-brief-and-execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # Set timezone for accurate date display in outputs
    env:
      TZ: Australia/Sydney

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic openai

      - name: Generate morning brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python scripts/run_morning.py

      - name: Commit morning brief
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Chief of Staff"
          git add data/
          git diff --staged --quiet || git commit -m "Morning brief - $(date +%Y-%m-%d)"

      - name: Execute priorities
        if: ${{ github.event.inputs.skip_execution != 'true' }}
        timeout-minutes: 15
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PYTHONPATH: strategies/backtest
        run: |
          MAX="${{ github.event.inputs.max_priorities || '3' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          CMD="python scripts/run_priorities.py --max $MAX"
          if [ "$DRY" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          $CMD

      - name: Commit execution results
        if: ${{ github.event.inputs.skip_execution != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI Chief of Staff"
          git add -A
          git diff --staged --quiet || git commit -m "Execute priorities - $(date +%Y-%m-%d)"

      - name: Push all changes
        run: |
          git push

      - name: Alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          python3 -c "
import os, json
from urllib import request, error

api_key = os.environ.get('RESEND_API_KEY', '')
email_to = os.environ.get('EMAIL_TO', '')
if not api_key or not email_to:
    print('Cannot send alert: missing RESEND_API_KEY or EMAIL_TO')
    exit(0)

payload = {
    'from': 'onboarding@resend.dev',
    'to': [email_to],
    'subject': '[ALERT] Morning workflow FAILED — $(date +%Y-%m-%d)',
    'html': '<h2>Morning Brief + Execute workflow failed</h2>'
            '<p>The GitHub Actions workflow failed or timed out.</p>'
            '<p>Check: <a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">workflow run</a></p>'
            '<p><em>Automated alert from AI Chief of Staff</em></p>'
}
data = json.dumps(payload).encode()
req = request.Request('https://api.resend.com/emails', data=data, headers={
    'Authorization': f'Bearer {api_key}',
    'Content-Type': 'application/json',
}, method='POST')
try:
    with request.urlopen(req, timeout=15) as resp:
        print(f'Alert sent: {resp.read().decode()}')
except Exception as e:
    print(f'Alert failed: {e}')
"
